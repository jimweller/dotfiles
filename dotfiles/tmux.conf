set -g default-shell /bin/zsh
set -g extended-keys always
set -as terminal-features ',xterm-256color:extkeys'

# plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'lost-melody/tmux-command-palette'
set -g @cmdpalette-key-prefix 'prefix Space'

# resurrect: save pane contents
set -g @resurrect-capture-pane-contents 'on'

# continuum: auto-save every 5 min, auto-restore on tmux start
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'

set-window-option -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set-option -g set-titles on
set-option -g set-titles-string "#{session_name}"

set -g status-style "bg=colour234"
set -g status-left-length 120
set -g status-right-length 120
set -g mouse on
bind -n WheelUpPane if-shell -F "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M -N 3'"
bind -n WheelDownPane send-keys -M -N 3
bind x kill-pane

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
run '~/.tmux/plugins/tpm/bin/install_plugins'

set -g history-limit 200000
run-shell 'bash ~/.config/dotfiles/scripts/gitmux-install.sh'
set -g status-left "#(bash ~/.config/dotfiles/scripts/tmux-p10k-left.sh '#{pane_current_path}')"
set -g status-right "#(bash ~/.config/dotfiles/scripts/tmux-right.sh)"
set -g window-status-format "#[fg=colour240,bg=colour235] #I:#W "
set -g window-status-current-format "#[fg=colour39,bg=colour236] #I:#W "
set -g window-status-separator " "
set -g status-justify right
