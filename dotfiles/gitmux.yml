tmux:
  symbols:
    branch: "\uF126 "
    hashprefix: ":"
    ahead: "\u21E1"
    behind: "\u21E3"
    staged: "+"
    conflict: "~"
    modified: "!"
    untracked: "?"
    stashed: "*"
    insertions: ""
    deletions: ""
    clean: ""
  styles:
    clear: "#[none]"
    state: "#[fg=red,bold]"
    branch: "#[fg=colour76,bold]"
    remote: "#[fg=cyan]"
    divergence: "#[fg=colour76]"
    staged: "#[fg=colour178,bold]"
    conflict: "#[fg=red,bold]"
    modified: "#[fg=colour178,bold]"
    untracked: "#[fg=colour76,bold]"
    stashed: "#[fg=cyan,bold]"
    insertions: "#[fg=green]"
    deletions: "#[fg=red]"
    clean: "#[fg=colour76,bold]"
  layout: [branch, divergence, " ", flags]
  options:
    branch_max_len: 0
    branch_trim: right
    ellipsis: "..."
    hide_clean: true
    swap_divergence: false
    flags_without_count: false
