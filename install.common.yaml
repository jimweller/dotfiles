- defaults:
    link:
      force: true
      create: true
      relink: true

- create:
  - ~/bin
  - ~/.secrets
  - ~/.logs
  - ~/tmp
  - ~/scratch
  - ~/work
  - ~/personal
  - ~/.ssh
  - ~/assets/postgres
  - ~/assets/qdrant
  - ~/assets/steampipe

- shell:
  - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.aws/config: configs/aws/aws_config
    ~/.azure/config: configs/azure/azure_config
    ~/.bash_profile: configs/zsh/bash_profile
    ~/.config/bat/config: configs/bat/bat_config
    ~/.docker/config.js: configs/docker/docker_config
    ~/.gitconfig-all: configs/git/gitconfig-all
    # this is a hack to make p10k work since it uses and outdated fork of libgit2 that doesn't honor GIT_CONFIG_GLOBAL
    ~/.gitconfig: configs/git/gitconfig-all
    ~/.gitconfig-jim: configs/git/gitconfig-jim
    ~/.gitconfig-work: configs/git/gitconfig-work
    ~/.config/gh/:
      glob: true
      path: configs/github/*
    ~/.roo/settings/mcp_settings.json: configs/roocode/mcp_settings.json
    ~/.vscode/extensions/andrewmitchell.devcontainer-template-manager-0.2.2/templates/0jimbox: submodules/devcontainer
    ~/.roo/settings/custom_modes.yaml: configs/roocode/custom_modes.yaml
    ~/.roo/rules/global-rules.md: configs/roocode/rules/rules/global-rules.md
    ~/.roo/rules/markdown-rules.md: configs/roocode/rules/rules/markdown-rules.md
    # ~/.roo/:
    #   glob: true
    #   path: configs/roocode/rules/**
    ~/.ssh/config: configs/ssh/ssh_config
    ~/.tmux.conf: configs/tmux/tmux.conf
    ~/.config/ghostty/config: configs/ghostty/ghostty_config
    ~/.ripgreprc: configs/ripgrep/ripgreprc
    ~/.config/powershell/:
      glob: true
      path: configs/powershell/*
    ~/.zsh_plugins.txt: configs/zsh/zsh_plugins.txt
    ~/.serena/serena_config.yml: configs/serena/serena_config.yml
    ~/.gemini/settings.json: configs/gemini/gemini_settings
    ~/.config/opencode/opencode.json: configs/opencode/opencode.json
    ~/.config/opencode/agents/:
      glob: true
      path: configs/opencode/agents/*
    ~/assets/postgres/pg-container.sh: scripts/pg-container.sh
    ~/assets/qdrant/qdrant-container.sh: scripts/qdrant-container.sh

- link:
    ~/.claude.json: configs/claude-code/claude_json
    ~/.claude/settings.json: configs/claude-code/claude_settings_json_azure
    ~/.claude/settings-aws.json: configs/claude-code/claude_settings_json_aws
    ~/.claude/settings-azure.json: configs/claude-code/claude_settings_json_azure
    ~/.claude/statusline-command.sh: configs/claude-code/statusline-command.sh
    ~/.claude/CLAUDE.md: configs/claude-code/claude_md.md
    ~/.claude/plugins/known_marketplaces.json: configs/claude-code/known_marketplaces.json
    ~/.claude/plugins/installed_plugins.json: configs/claude-code/installed_plugins.json
    ~/.claude/skills/:
      glob: true
      path: configs/claude-code/skills/*
    ~/.claude/hooks/:
      glob: true
      path: configs/claude-code/hooks/*
    ~/.claude/rules/:
      glob: true
      path: configs/claude-code/rules/*
    ~/.claude/tools/humble-master: configs/claude-code/tools/humble-master
    ~/.config/markdownlint/.markdownlint-cli2.jsonc: configs/markdownlint/markdownlint-cli2.jsonc
    ~/.prettierrc: configs/prettier/prettierrc

- link:
    ~/.claude/hooks/:
      glob: true
      path: configs/claude-code/tools/lsp-enforcement-kit/hooks/*.js
    ~/.claude/hooks/lib/:
      glob: true
      path: configs/claude-code/tools/lsp-enforcement-kit/hooks/lib/*.js

- defaults:
    link:
      force: true
      create: true

- link:
    ~/.p10k.zsh: configs/p10k/p10k.zsh
    ~/.zshrc: configs/zsh/zshrc


