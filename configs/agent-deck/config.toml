# Agent Deck Configuration
# All options: https://github.com/asheshgoplani/agent-deck/blob/main/skills/agent-deck/references/config-reference.md

default_tool = "claude"
theme = "dark"
sync_title = false

[claude]
  dangerous_mode = true

[worktree]
  auto_cleanup = false

[global_search]
  enabled = true
  tier = "auto"
  recent_days = 90

[logs]
  max_size_mb = 10
  max_lines = 10000
  remove_orphans = true
  debug_compress = false

[mcp_pool]
  auto_start = false
  shutdown_on_exit = false
  fallback_to_stdio = false
  show_pool_status = false

[updates]
  check_enabled = true
  notify_in_cli = false

[experiments]
  date_prefix = false

[notifications]
  enabled = false

[shell]
  launch_shell = true

[conductor]
  heartbeat_interval = 0

[display]
  show_pane_titles = true

[feedback]
  disabled = true

[ui]
  preview_pct = 60
  new_session_enter_advances = false

