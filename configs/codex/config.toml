model = "gpt-5.5"
model_provider = "openai-env"
model_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"
file_opener = "vscode"
hide_agent_reasoning = false

# Daneel persona injection (appended to Codex system prompt, not replacing it)
model_instructions_file = "~/.codex/daneel.md"

# Read existing CLAUDE.md files in projects that don't have AGENTS.md
project_doc_fallback_filenames = ["CLAUDE.md"]

[agents]
max_threads = 8

[model_providers.openai-env]
name = "openai-env"
base_url = "https://api.openai.com/v1"
wire_api = "responses"
env_key = "OPENAI_API_KEY"

[analytics]
enabled = false

[feedback]
enabled = false

[history]
max_bytes = 104857600

[tui]
animations = false
show_tooltips = false

[tui.model_availability_nux]
"gpt-5.5" = 3


# --- MCP Servers ---

[mcp_servers.c7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
env_vars = ["CONTEXT7_API_KEY"]
[mcp_servers.c7.env]
DEFAULT_MINIMUM_TOKENS = "10000"

[mcp_servers.g]
transport = "streamable_http"
url = "http://localhost:9091/mcp/"

[mcp_servers.repomix]
command = "npx"
args = ["-y", "repomix", "--mcp"]

[mcp_servers.slack]
transport = "streamable_http"
url = "https://mcp.slack.com/mcp"

[mcp_servers.serena]
command = "serena"
args = ["start-mcp-server", "--context=codex", "--project-from-cwd"]

